# HewaSense — Audit Configuration
#
# Active use: ONLY read by `scripts/audit.py` for codebase forbidden-pattern
# scanning. All other config (pilot constants, model paths, phase tracking,
# personas) previously lived here but was unread scaffolding. Removed
# 2026-04-16 to eliminate duplicate-source-of-truth drift (same lesson as
# the phase2/modules vs backend/modules consolidation on 2026-04-15).
#
# Single sources of truth for what used to be here:
#   - pilot coordinates / farmers / zones  → backend/app/services/risk_service.py
#   - shadow run dates / target_days       → backend/app/config/shadow_run.py
#   - active model / feature count         → outputs/models/active_model.json
#   - feature schema                       → outputs/models/feature_selection_results.json
#   - session context / guidance           → CLAUDE.md (repo root)
#   - framework / personas                 → .agent/rules/SKILL.md (documentation only;
#                                             persona mode is not wired to runtime)

# ─── Forbidden Patterns (scanned by audit.py before any merge) ───
forbidden_patterns:
  - predict_proba
  - dummy_data
  - synthetic
  - np.random.normal
  - "datetime.now()"           # Naive datetime — must use datetime.now(timezone.utc)

# ─── Allowed in test files only ───
test_allowed_patterns:
  - mock                       # mock is OK in test files, forbidden in production code
