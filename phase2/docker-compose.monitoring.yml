# Docker Compose for Monitoring Infrastructure
# This extends the main docker-compose files with Prometheus and Grafana

version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: climate_prometheus
    ports:
      - "9091:9090"  # Using 9091 to avoid conflict with pipeline-monitor
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./configs/prometheus-alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: climate_grafana
    ports:
      - "3001:3000"  # Using 3001 to avoid conflict with frontend
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/pipeline-dashboard.json
      - ./configs/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  # Optional: Alertmanager for advanced alerting
  # alertmanager:
  #   image: prom/alertmanager:latest
  #   container_name: climate_alertmanager
  #   ports:
  #     - "9093:9093"
  #   volumes:
  #     - ./configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml
  #     - alertmanager_data:/alertmanager
  #   command:
  #     - '--config.file=/etc/alertmanager/alertmanager.yml'
  #     - '--storage.path=/alertmanager'
  #   restart: unless-stopped
  #   networks:
  #     - monitoring

volumes:
  prometheus_data:
  grafana_data:
  # alertmanager_data:

networks:
  monitoring:
    driver: bridge
