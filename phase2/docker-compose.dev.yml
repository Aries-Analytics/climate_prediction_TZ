services:
  db:
    image: postgres:15
    container_name: climate_db_dev
    environment:
      POSTGRES_DB: climate_dev
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d climate_dev" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: climate_backend_dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/climate_dev
      - JWT_SECRET=dev_secret_change_in_production
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:3001"]
    volumes:
      - ./backend:/app
      - ./outputs:/outputs
      - ./data:/app/data # Mount data directory for scripts
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: climate_frontend_dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  pipeline-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.scheduler
    container_name: climate_pipeline_scheduler_dev
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/climate_dev
      - PIPELINE_SCHEDULE=0 6 * * *
      - PIPELINE_TIMEZONE=UTC
      - ALERT_EMAIL_ENABLED=false
      - ALERT_SLACK_ENABLED=false
    volumes:
      - ./backend:/app
      - ./outputs:/outputs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  pipeline-monitor:
    build:
      context: ./backend
      dockerfile: Dockerfile.monitoring
    container_name: climate_pipeline_monitor_dev
    ports:
      - "9090:9090"
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/climate_dev
      - MONITORING_METRICS_PORT=9090
      - MONITORING_HEALTH_PORT=8080
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_dev:
