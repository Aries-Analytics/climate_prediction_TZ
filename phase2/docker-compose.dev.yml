services:
  db:
    image: postgres:15
    container_name: climate_db_dev
    environment:
      POSTGRES_DB: climate_dev
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d climate_dev" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: climate_backend_dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/climate_dev
      - JWT_SECRET=dev_secret_change_in_production
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:3001"]
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/earthengine/credentials
    volumes:
      - ./backend:/app
      - ./outputs:/outputs
      - ./data:/app/data # Mount data directory for scripts
      - ~/.config/earthengine/credentials:/root/.config/earthengine/credentials:ro
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: climate_frontend_dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=/api
      - API_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  pipeline-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.scheduler
    container_name: climate_pipeline_scheduler_dev
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/climate_dev
      - PIPELINE_SCHEDULE=0 6 * * *
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/earthengine/credentials
      - PIPELINE_TIMEZONE=Africa/Dar_es_Salaam
      - ALERT_EMAIL_ENABLED=false
      - ALERT_SLACK_ENABLED=${ALERT_SLACK_ENABLED:-false}  # false locally; server .env sets true
      - ALERT_SLACK_WEBHOOK_URL=${ALERT_SLACK_WEBHOOK_URL}
      - ECMWF_DATASTORES_URL=https://cds.climate.copernicus.eu/api
      - ECMWF_DATASTORES_KEY=${ERA5_API_KEY}
      # GEE service account auth (Docker-friendly, no browser needed).
      # Set GEE_SERVICE_ACCOUNT in .env on the server. Key file mounted below.
      - GEE_SERVICE_ACCOUNT=${GEE_SERVICE_ACCOUNT:-}
      - GEE_PRIVATE_KEY_FILE=/app/secrets/gee-service-account.json
    volumes:
      - ./backend:/app
      - ./outputs:/outputs
      # modules/ and utils/ now live inside backend/ only (consolidated Apr 15 2026).
      # ./backend:/app mount already exposes them at /app/modules and /app/utils.
      - ~/.config/earthengine/credentials:/root/.config/earthengine/credentials:ro
      - ~/.cdsapirc:/root/.cdsapirc:ro
      - ./secrets:/app/secrets:ro
      # Stage 6 auto-log: mount phase2/ for file writes, outer repo root for git
      - ./:/app/repo_root           # phase2/ — memory/, docs/
      - ../:/app/repo_root_parent   # outer repo root (work-tree for git)
      - ../.git:/app/repo_git       # .git dir for git operations
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  pipeline-monitor:
    build:
      context: ./backend
      dockerfile: Dockerfile.monitoring
    container_name: climate_pipeline_monitor_dev
    ports:
      - "9090:9090"
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/climate_dev
      - MONITORING_METRICS_PORT=9090
      - MONITORING_HEALTH_PORT=8080
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_dev:
