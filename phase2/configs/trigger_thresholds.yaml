version: 2.0.0
calibration_date: '2025-12-30'
data_period: 2000-01-01 to 2025-12-31
locations: 6
total_records: 1858

target_trigger_rates:
  flood: 0.10           # Target: 5-15%, achieved: 9.42%
  drought: 0.12         # Target: 8-20%, achieved: 12.0%
  crop_failure: 0.06    # Target: 3-10%, achieved: 6.22%

flood_triggers:
  daily_rainfall_mm:
    threshold: 258.57
    percentile: 95
    rationale: "Calibrated to 95th percentile (P95) of daily rainfall from 6-location data (2000-2025). Stricter than previous 150mm to reduce false positives."
    data_source: "CHIRPS 2000-2025, 6 locations (1858 records)"
    calibration_date: '2025-12-30'
    
  rainfall_7day_mm:
    threshold: 1168.57
    percentile: 95
    rationale: "Calibrated to 95th percentile (P95) of 7-day cumulative rainfall. Much stricter than previous 250mm."
    data_source: "CHIRPS 2000-2025, 6 locations"
    calibration_date: '2025-12-30'
    
  logic: "AND"
  logic_rationale: "Changed from OR to AND - both conditions must be met for trigger activation. This significantly reduces false positives (86% → 9.4%)"
  
  heavy_rain_days_7day:
    threshold: 5
    heavy_rain_definition_mm: 258.57
    rationale: "Heavy rain day defined as >P95 (258.57mm). Used for confidence scoring."
    data_source: "CHIRPS 2000-2025, 6 locations"
    calibration_date: '2025-12-30'
    
  rainfall_percentile:
    threshold: 95
    rationale: "Extreme rainfall events (top 5%)"
    data_source: "CHIRPS 2000-2025, 6 locations"

drought_triggers:
  spi_30day:
    threshold: -0.60
    percentile: 12
    rationale: "Calibrated to 12th percentile (P12) of SPI-30 to achieve 12% trigger rate. Relaxed from -1.5 to capture moderate drought events."
    data_source: "Calculated from CHIRPS 2000-2025, 6 locations"
    calibration_date: '2025-12-30'
    
  consecutive_dry_days:
    wet_season_threshold: 28
    dry_season_threshold: 28
    dry_day_definition_mm: 1.0
    rationale: "Kept at 28 days for config compatibility. Monthly data doesn't use this directly."
    calibration_date: '2025-12-30'
    
  rainfall_deficit_pct:
    threshold: 50
    rationale: "Significant deficit from climatological normal"
    data_source: "CHIRPS 2000-2025, 6 locations"

crop_failure_triggers:
  vci_threshold:
    critical: 3.33
    severe: 13.64
    percentile: 5
    duration_days: 30
    rationale: "Calibrated to 5th percentile (P5) of VCI to achieve 6.22% trigger rate. Stricter than previous threshold."
    data_source: "MODIS NDVI 2000-2025, 6 locations (1866 records)"
    calibration_date: '2025-12-30'
    
  ndvi_anomaly_std:
    threshold: -1.56
    percentile: 5
    duration_days: 21
    rationale: "Calibrated to 5th percentile (P5) of NDVI anomaly. Indicates severe vegetation stress."
    data_source: "MODIS NDVI 2000-2025, 6 locations"
    calibration_date: '2025-12-30'
    
  crop_failure_risk_score:
    threshold: 75
    rationale: "High probability of crop failure based on combined indicators"
    data_source: "MODIS NDVI 2000-2025, 6 locations"

regional_adjustments:
  enabled: false
  note: "Future enhancement - per-location calibration"
  regions:
    coastal:
      flood_multiplier: 1.2
    highland:
      drought_multiplier: 0.8
    lowland:
      flood_multiplier: 1.1

calibration_results:
  flood:
    target_rate: "5-15%"
    achieved_rate: "9.42%"
    status: "✓ Within target"
    previous_rate: "86.3%"
    improvement: "Reduced by 76.9 percentage points"
    
  drought:
    target_rate: "8-20%"
    achieved_rate: "12.0%"
    status: "✓ Within target"
    previous_rate: "5.0%"
    improvement: "Increased by 7 percentage points"
    
  crop_failure:
    target_rate: "3-10%"
    achieved_rate: "6.22%"
    status: "✓ Within target"
    previous_rate: "15.1%"
    improvement: "Reduced by 8.88 percentage points"
