services:
  db:
    image: postgres:15-alpine
    container_name: climate_db_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-climate_prod}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-climate_prod}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    env_file:
      - .env
    volumes:
      - ./outputs:/outputs
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.services.pipeline.run_scheduler
    container_name: climate_pipeline_scheduler_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PIPELINE_SCHEDULE: ${PIPELINE_SCHEDULE:-0 6 * * *}
      PIPELINE_TIMEZONE: ${PIPELINE_TIMEZONE:-Africa/Dar_es_Salaam}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER}
      ALERT_EMAIL_ENABLED: ${ALERT_EMAIL_ENABLED:-false}
      ALERT_EMAIL_SMTP_HOST: ${ALERT_EMAIL_SMTP_HOST}
      ALERT_EMAIL_SMTP_PORT: ${ALERT_EMAIL_SMTP_PORT:-587}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM}
      ALERT_EMAIL_RECIPIENTS: ${ALERT_EMAIL_RECIPIENTS}
      ALERT_SLACK_ENABLED: ${ALERT_SLACK_ENABLED:-false}
      ALERT_SLACK_WEBHOOK_URL: ${ALERT_SLACK_WEBHOOK_URL}
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/earthengine/credentials
      GEE_SERVICE_ACCOUNT: ${GEE_SERVICE_ACCOUNT:-}
      GEE_PRIVATE_KEY_FILE: /app/secrets/gee-service-account.json
    env_file:
      - .env
    volumes:
      - ./outputs:/outputs
      - ~/.config/earthengine/credentials:/root/.config/earthengine/credentials:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f run_scheduler || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: climate_frontend_prod
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: climate_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data_prod:
