services:
  db:
    image: postgres:15
    container_name: climate_db_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-climate_prod}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-climate_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: climate_backend_prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    volumes:
      - ./outputs:/outputs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: climate_frontend_prod
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: climate_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  pipeline-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.scheduler
    container_name: climate_pipeline_scheduler_prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PIPELINE_SCHEDULE=${PIPELINE_SCHEDULE:-0 6 * * *}
      - PIPELINE_TIMEZONE=${PIPELINE_TIMEZONE:-UTC}
      - ALERT_EMAIL_ENABLED=${ALERT_EMAIL_ENABLED:-false}
      - ALERT_EMAIL_SMTP_HOST=${ALERT_EMAIL_SMTP_HOST}
      - ALERT_EMAIL_SMTP_PORT=${ALERT_EMAIL_SMTP_PORT:-587}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM}
      - ALERT_EMAIL_RECIPIENTS=${ALERT_EMAIL_RECIPIENTS}
      - ALERT_SLACK_ENABLED=${ALERT_SLACK_ENABLED:-false}
      - ALERT_SLACK_WEBHOOK_URL=${ALERT_SLACK_WEBHOOK_URL}
    volumes:
      - ./outputs:/outputs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  pipeline-monitor:
    build:
      context: ./backend
      dockerfile: Dockerfile.monitoring
    container_name: climate_pipeline_monitor_prod
    ports:
      - "9090:9090"
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONITORING_METRICS_PORT=${MONITORING_METRICS_PORT:-9090}
      - MONITORING_HEALTH_PORT=${MONITORING_HEALTH_PORT:-8080}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data_prod:
