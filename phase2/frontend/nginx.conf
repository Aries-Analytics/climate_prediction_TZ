server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # Cache hashed static assets (JS, CSS) for 1 year — Vite adds content hashes
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache fonts and images for 30 days
    location ~* \.(woff|woff2|ttf|eot|ico|png|jpg|jpeg|gif|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Never cache index.html (so new deploys are picked up immediately)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy with timeouts
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent long hangs on slow endpoints
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
