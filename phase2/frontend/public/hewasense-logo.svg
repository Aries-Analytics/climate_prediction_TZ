<svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HewaSense logo">
  <defs>
    <clipPath id="hs-circle">
      <circle cx="210" cy="195" r="182"/>
    </clipPath>
    <!-- Left half dark navy radial -->
    <radialGradient id="hs-left-bg" cx="35%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="60%" stop-color="#0e2440"/>
      <stop offset="100%" stop-color="#060f1e"/>
    </radialGradient>
    <!-- Right half dark teal radial -->
    <radialGradient id="hs-right-bg" cx="72%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#0d4a4a"/>
      <stop offset="55%" stop-color="#082e2e"/>
      <stop offset="100%" stop-color="#041818"/>
    </radialGradient>
    <!-- Wave gradient blue -->
    <linearGradient id="hs-wave1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#1e88e5"/>
    </linearGradient>
    <linearGradient id="hs-wave2" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="hs-wave3" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#64b5f6"/>
    </linearGradient>
    <!-- Gold glow filter -->
    <filter id="hs-glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Teal glow filter -->
    <filter id="hs-glow-teal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ─── CIRCLE BACKGROUND ─────────────────────────────────────────── -->
  <g clip-path="url(#hs-circle)">

    <!-- Left half background -->
    <rect x="28" y="13" width="182" height="364" fill="url(#hs-left-bg)"/>
    <!-- Right half background -->
    <rect x="210" y="13" width="182" height="364" fill="url(#hs-right-bg)"/>

    <!-- ─── LEFT SIDE: OCEAN WAVES ──────────────────────────────────── -->

    <!-- Wave 1 – outermost large sweep -->
    <path d="
      M 58,22
      C 90,18 120,38 138,72
      C 154,102 156,138 148,168
      C 138,200 118,222 108,252
      C 96,282 96,314 108,348
      L 65,390 L 28,390 L 28,22 Z
    " fill="url(#hs-wave1)" opacity="0.75"/>

    <!-- Wave 2 – mid sweep -->
    <path d="
      M 95,18
      C 120,14 148,32 162,65
      C 174,94 174,130 164,160
      C 152,192 136,210 128,242
      C 118,272 120,306 132,342
    " fill="none" stroke="url(#hs-wave2)" stroke-width="18"
       stroke-linecap="round" opacity="0.80"/>

    <!-- Wave 3 – inner tighter curl -->
    <path d="
      M 135,40
      C 152,30 168,45 172,72
      C 176,98 168,126 158,150
      C 146,178 136,196 136,224
    " fill="none" stroke="url(#hs-wave3)" stroke-width="13"
       stroke-linecap="round" opacity="0.70"/>

    <!-- Curl tip of innermost wave -->
    <path d="
      M 158,150
      C 168,138 178,138 182,150
      C 185,160 178,174 168,178
      C 162,180 156,174 158,165
      C 159,158 162,152 158,150 Z
    " fill="#2196f3" opacity="0.65"/>

    <!-- Leaf / flame shape at the boundary -->
    <path d="
      M 192,120
      C 206,105 220,108 222,130
      C 224,150 214,175 200,190
      C 192,196 182,192 180,178
      C 178,162 184,138 192,120 Z
    " fill="#060f1e" stroke="#1565c0" stroke-width="1.5" opacity="0.90"/>

    <!-- ─── RIGHT SIDE: CONSTELLATION / NEURAL NETWORK ─────────────── -->

    <!-- Constellation connecting lines -->
    <!-- Main structure lines – teal -->
    <line x1="256" y1="102" x2="312" y2="72"  stroke="#1a9e8e" stroke-width="1.8" opacity="0.65"/>
    <line x1="312" y1="72"  x2="358" y2="128" stroke="#1a9e8e" stroke-width="1.8" opacity="0.65"/>
    <line x1="312" y1="72"  x2="302" y2="175" stroke="#1a9e8e" stroke-width="1.8" opacity="0.65"/>
    <line x1="256" y1="102" x2="302" y2="175" stroke="#1a9e8e" stroke-width="1.8" opacity="0.65"/>
    <line x1="302" y1="175" x2="362" y2="215" stroke="#1a9e8e" stroke-width="1.8" opacity="0.65"/>
    <line x1="302" y1="175" x2="270" y2="268" stroke="#1a9e8e" stroke-width="1.8" opacity="0.60"/>
    <line x1="230" y1="228" x2="270" y2="268" stroke="#1a9e8e" stroke-width="1.5" opacity="0.60"/>
    <line x1="230" y1="228" x2="302" y2="175" stroke="#26c5b0" stroke-width="1.2" opacity="0.45"/>
    <line x1="362" y1="215" x2="342" y2="308" stroke="#1a9e8e" stroke-width="1.5" opacity="0.55"/>
    <line x1="270" y1="268" x2="342" y2="308" stroke="#f0c050" stroke-width="1.5" opacity="0.60"/>

    <!-- Circuit trace at bottom -->
    <line x1="342" y1="308" x2="375" y2="308" stroke="#f0c050" stroke-width="2.2" opacity="0.70"/>
    <line x1="375" y1="308" x2="375" y2="330" stroke="#f0c050" stroke-width="1.8" opacity="0.55"/>
    <circle cx="375" cy="308" r="4.5" fill="none" stroke="#f0c050" stroke-width="1.8" opacity="0.70"/>

    <!-- Teal node glows (soft) -->
    <circle cx="256" cy="102" r="13" fill="#26c5b0" opacity="0.10"/>
    <circle cx="302" cy="175" r="16" fill="#26c5b0" opacity="0.12"/>

    <!-- Gold node glows (soft) -->
    <circle cx="312" cy="72"  r="18" fill="#f0c050" opacity="0.14"/>
    <circle cx="358" cy="128" r="10" fill="#f0c050" opacity="0.10"/>

    <!-- Constellation nodes – teal -->
    <circle cx="256" cy="102" r="6.5" fill="#4dd8c8" filter="url(#hs-glow-teal)" opacity="0.90"/>
    <circle cx="302" cy="175" r="8.5" fill="#26c5b0" filter="url(#hs-glow-teal)" opacity="0.95"/>
    <circle cx="362" cy="215" r="5.5" fill="#4dd8c8" opacity="0.85"/>
    <circle cx="230" cy="228" r="4.5" fill="#4dd8c8" opacity="0.75"/>
    <circle cx="270" cy="268" r="5.5" fill="#4dd8c8" opacity="0.80"/>
    <circle cx="342" cy="308" r="4.5" fill="#4dd8c8" opacity="0.70"/>

    <!-- Constellation nodes – gold/amber -->
    <circle cx="312" cy="72"  r="9.5" fill="#f0c050" filter="url(#hs-glow-gold)" opacity="0.95"/>
    <circle cx="358" cy="128" r="6.5" fill="#f0c050" filter="url(#hs-glow-gold)" opacity="0.85"/>

  </g>

  <!-- ─── CIRCLE BORDER ─────────────────────────────────────────────── -->
  <circle cx="210" cy="195" r="182" fill="none" stroke="#1a6060" stroke-width="2" opacity="0.45"/>

  <!-- ─── WORDMARK ───────────────────────────────────────────────────── -->
  <!-- "Hewa" in white bold -->
  <text x="62" y="408"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2"
        fill="#ffffff">Hewa</text>
  <!-- "Sense" in teal -->
  <text x="242" y="408"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2"
        fill="#5ccfc4">Sense</text>
</svg>
